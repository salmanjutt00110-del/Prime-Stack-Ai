<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#050505" />
    <title>Prime Tools Hub — Premium AI Tools & Digital Services</title>
    <meta name="description" content="Prime Tools Hub — Pakistan & Global's #1 Marketplace for Premium AI Tools, ChatGPT Plus, Google Gemini Pro, Veo 3, Canva Pro, CapCut Pro, SuperGrok, Surfshark VPN & Digital Subscriptions." />
    <meta name="keywords" content="ChatGPT Plus Pakistan, Google Gemini Advanced, Veo 3 AI Video, CapCut Pro subscription, Canva Pro account, SuperGrok 12m, Surfshark VPN, Prime Tools Hub, PrimeTools.store" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <link rel="canonical" href="https://primetools.store/" />

    <!-- Self-hosted Inter font — eliminates 150ms render-blocking Google Fonts request -->
    <link rel="preload" as="font" type="font/woff2" href="/fonts/inter-400.woff2" crossorigin />
    <style>
      @font-face {
        font-family: 'Inter';
        font-style: normal;
        font-weight: 100 900;
        font-display: swap;
        src: url('/fonts/inter-400.woff2') format('woff2');
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
    </style>

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://primetools.store/" />
    <meta property="og:title" content="Prime Tools Hub — Premium AI Tools & Digital Services" />
    <meta property="og:description" content="Access ChatGPT Plus, Google Gemini Pro, Veo 3, Canva Pro, CapCut Pro & more through Prime Tools Hub on PrimeTools.store." />
    <meta property="og:image" content="https://primetools.store/prime-tools-logo.png" />
    <meta property="og:site_name" content="Prime Tools Hub" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://primetools.store/" />
    <meta name="twitter:title" content="Prime Tools Hub — Premium AI Tools & Digital Services" />
    <meta name="twitter:description" content="Access ChatGPT Plus, Google Gemini Pro, Veo 3, Canva Pro, CapCut Pro & more through Prime Tools Hub." />
    <meta name="twitter:image" content="https://primetools.store/prime-tools-logo.png" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://primetools.store/#organization",
          "name": "Prime Tools Hub",
          "url": "https://primetools.store/",
          "logo": "https://primetools.store/prime-tools-logo.png",
          "description": "Pakistan & Global's premier destination for genuine AI tools, creator accounts, VPNs, and digital subscriptions."
        },
        {
          "@type": "WebSite",
          "@id": "https://primetools.store/#website",
          "url": "https://primetools.store/",
          "name": "Prime Tools Hub",
          "publisher": { "@id": "https://primetools.store/#organization" },
          "potentialAction": {
            "@type": "SearchAction",
            "target": "https://primetools.store/#products?q={search_term_string}",
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "AggregateRating",
          "itemReviewed": {
            "@type": "Product",
            "name": "Prime Tools Hub Premium Subscriptions",
            "image": "https://primetools.store/prime-tools-logo.png",
            "description": "ChatGPT Plus, Gemini Advanced, Veo 3 AI Video, CapCut Pro, Canva Pro, SuperGrok, Surfshark VPN."
          },
          "ratingValue": "4.9",
          "reviewCount": "520",
          "bestRating": "5",
          "worstRating": "1"
        }
      ]
    }
    </script>

    <link rel="manifest" href="/manifest.json" />

    <!-- Preconnect to WhatsApp -->
    <link rel="dns-prefetch" href="https://wa.me" />
  </head>
